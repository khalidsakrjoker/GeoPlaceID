name: Build GeoPlaceID for Windows

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Build CustomTkinter App with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "GeoPlaceID" --collect-all customtkinter app.py

    - name: Copy Docs to Dist
      run: |
        Copy-Item -Path "docs" -Destination "dist/GeoPlaceID/docs" -Recurse

    - name: Upload Windows Standalone App
      uses: actions/upload-artifact@v4
      with:
        name: GeoPlaceID-Windows-App
        path: dist/GeoPlaceID
